name: Compilar APK de Flet

on:
  push:
    branches:
      - main # Asegúrate de que este sea el nombre exacto de tu rama (main o master)
  workflow_dispatch: # Esto te permite activar la compilación a mano desde la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código de tu repositorio en el servidor de GitHub
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configura el entorno de Java necesario para compilar aplicaciones Android
      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Prepara las herramientas nativas del SDK de Android
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      # 4. Firma digitalmente y acepta los términos de Android en modo silencioso
      - name: Aceptar licencias de Android
        run: |
          yes | sdkmanager --licenses || true

      # 5. Levanta el intérprete de Python en su versión más estable para Flet
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 6. Instala los paquetes de tu app en el entorno limpio de Linux
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-audio

      # 7. Compila el APK usando la bandera para omitir preguntas interactivas
      - name: Compilar APK con Flet
        run: |
          flet build apk --project src --no-interactive

      # 8. Empaqueta el archivo .apk resultante para que lo puedas descargar
      - name: Subir APK compilado
        uses: actions/upload-artifact@v4
        with:
          name: ChargeAlarm-Android-APK
          path: build/apk/*.apk