name: Compilar APK de Flet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceptar licencias de Android
        run: |
          yes | sdkmanager --licenses || true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-audio

      # PASO CORREGIDO: Le decimos a Flet exactamente qué carpeta usar y cómo se llama el archivo
      - name: Compilar APK con Flet
        run: |
          yes | flet build apk --project src --module-name main

      - name: Subir APK compilado
        uses: actions/upload-artifact@v4
        with:
          name: ChargeAlarm-Android-APK
          path: build/apk/*.apk